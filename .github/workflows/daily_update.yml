name: Daily TVBox Update

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}

      - name: Download & clean JSON + JAR + generate multi
        env:
          GH_USER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          python3 scripts/github_update.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/clean static/jar migu.m3u multi.json
          git diff --quiet && echo "No changes" || {
            git commit -m "🛠️ Daily TVBox refresh $(date +%F)"
            git push
          }
