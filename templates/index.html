<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📺 TVBox 接口聚合管理</title>
<style>
  :root {
    --bg: #0f0f13;
    --card: #1a1b23;
    --card-hover: #22232e;
    --border: #2a2b38;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #6c5ce7;
    --green: #00b894;
    --red: #e17055;
    --orange: #fdcb6e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px;
  }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header h1 span { color: var(--accent); }
  .header .subtitle { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

  /* Import URL Card */
  .import-card {
    background: linear-gradient(135deg, #1a1b23 0%, #2d1f3d 100%);
    border: 1px solid var(--accent);
    border-radius: 16px; padding: 24px; margin-bottom: 30px;
  }
  .import-card h2 { font-size: 16px; margin-bottom: 12px; color: var(--accent); }
  .import-url {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .import-url input {
    flex: 1; min-width: 200px;
    background: #0f0f13; border: 1px solid var(--border);
    color: var(--accent); padding: 12px 16px; border-radius: 8px;
    font-size: 15px; font-family: monospace;
  }
  .copy-btn {
    background: var(--accent); color: white; border: none;
    padding: 12px 24px; border-radius: 8px; cursor: pointer;
    font-size: 14px; font-weight: 600;
    transition: all 0.2s;
  }
  .copy-btn:hover { filter: brightness(1.2); }
  .copy-btn.copied { background: var(--green); }

  /* Controls */
  .controls {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .controls input {
    flex: 1; min-width: 200px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 8px;
    font-size: 14px;
  }
  .controls button, .btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 8px;
    cursor: pointer; font-size: 14px; transition: all 0.15s;
  }
  .controls button:hover, .btn:hover { background: var(--card-hover); }
  .btn-primary { background: var(--accent); border-color: var(--accent); font-weight: 600; }
  .btn-primary:hover { filter: brightness(1.2); }
  .btn-danger { background: transparent; border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red); color: white; }

  /* Stats */
  .stats {
    display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .stat {
    background: var(--card); border-radius: 12px; padding: 16px 24px;
    flex: 1; min-width: 120px; text-align: center;
  }
  .stat .num { font-size: 28px; font-weight: 700; }
  .stat .label { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
  .stat.green .num { color: var(--green); }
  .stat.purple .num { color: var(--accent); }
  .stat.red .num { color: var(--red); }

  /* Source Table */
  .source-table {
    width: 100%; border-collapse: collapse; font-size: 14px;
  }
  .source-table th {
    text-align: left; padding: 12px 14px;
    color: var(--text-muted); font-weight: 600; font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  .source-table td {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .source-table tr:hover td { background: var(--card-hover); }
  .source-table .url-cell {
    max-width: 300px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; color: var(--text-muted); font-family: monospace; font-size: 12px;
  }
  .source-table .actions { white-space: nowrap; text-align: right; }
  .source-table .actions button { margin-left: 6px; }
  .toggle-btn {
    width: 44px; height: 24px; border-radius: 12px; border: none;
    cursor: pointer; position: relative; transition: all 0.2s;
    background: var(--border);
  }
  .toggle-btn.on { background: var(--green); }
  .toggle-btn::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 20px; height: 20px; border-radius: 50%;
    background: white; transition: all 0.2s;
  }
  .toggle-btn.on::after { left: 22px; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--card); border-radius: 16px; padding: 28px;
    width: 90%; max-width: 480px;
  }
  .modal h3 { margin-bottom: 16px; font-size: 18px; }
  .modal label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 13px; }
  .modal input, .modal textarea {
    width: 100%; padding: 10px 14px; margin-bottom: 16px;
    background: #0f0f13; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 14px;
  }
  .modal .btn-row { display: flex; gap: 10px; justify-content: flex-end; }

  /* Tag */
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .tag.green { background: rgba(0,184,148,0.15); color: var(--green); }
  .tag.red { background: rgba(225,112,85,0.15); color: var(--red); }
  .tag.gray { background: rgba(255,255,255,0.08); color: var(--text-muted); }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--green); color: var(--green);
    padding: 12px 24px; border-radius: 8px; font-size: 14px;
    display: none; z-index: 200;
  }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <div>
      <h1><span>TVBox</span> 聚合管理器</h1>
      <div class="subtitle">管理多个影视仓配置源，自动合并去重，一键导入</div>
    </div>
    <div>
      <button class="btn" onclick="refreshAll()">🔄 刷新缓存</button>
    </div>
  </div>

  <!-- Import URL Card -->
  <div class="import-card">
    <h2>📡 导入影视仓 / TVBox</h2>
    <div class="import-url">
      <div style="margin-bottom:12px">
        <div style="font-size:14px;font-weight:600;color:var(--orange);margin-bottom:4px">⭐ 多仓（推荐）：显示所有源列表供选择</div>
        <div style="display:flex;gap:12px">
          <input id="multiUrl" value="http://192.168.31.8:5005/multi" readonly onclick="this.select()">
          <button class="copy-btn" onclick="copyUrl('multiUrl','📋')">📋 复制</button>
        </div>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:14px;font-weight:600;color:var(--accent);margin-bottom:4px">✅ 合并：所有源合为一体</div>
        <div style="display:flex;gap:12px">
          <input id="mergeUrl" value="http://192.168.31.8:5005/tvbox.json" readonly onclick="this.select()">
          <button class="copy-btn" onclick="copyUrl('mergeUrl','📋')">📋 复制</button>
        </div>
      </div>
      <div style="margin-bottom:8px">
        <div style="font-size:14px;font-weight:600;color:var(--green);margin-bottom:4px">🔹 单源：jsm全家桶</div>
        <div style="display:flex;gap:12px">
          <input id="singleUrl" value="http://192.168.31.8:5005/single/jsm" readonly onclick="this.select()">
          <button class="copy-btn" onclick="copyUrl('singleUrl','📋')">📋 复制</button>
        </div>
      </div>
    </div>
    <div style="margin-top:12px;color:var(--text-muted);font-size:13px">
      影视仓 → 设置 → 配置地址 → 粘贴 → 确定 ；如果合并报错，先用<b>单源</b>试试
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat purple"><div class="num" id="totalSources">--</div><div class="label">总接口数</div></div>
    <div class="stat green"><div class="num" id="enabledSources">--</div><div class="label">已启用</div></div>
    <div class="stat purple"><div class="num" id="totalSites">--</div><div class="label">点播源</div></div>
    <div class="stat green"><div class="num" id="totalLives">--</div><div class="label">直播频道</div></div>
  </div>

  <!-- Add Source -->
  <div class="controls">
    <input id="newName" placeholder="名称（如：我的自用源）">
    <input id="newUrl" placeholder="接口地址 URL">
    <button class="btn-primary" onclick="addSource()">➕ 添加接口</button>
  </div>

  <!-- Source Table -->
  <table class="source-table">
    <thead>
      <tr>
        <th style="width:40px">启用</th>
        <th>名称</th>
        <th class="url-cell">地址</th>
        <th style="width:100px;text-align:center">状态</th>
        <th style="width:120px" class="actions">操作</th>
      </tr>
    </thead>
    <tbody id="sourceList"></tbody>
  </table>
  <div id="emptyMsg" style="text-align:center;color:var(--text-muted);padding:60px 0;display:none">
    还没有接口，在上方输入框添加吧 🚀
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ 编辑接口</h3>
    <input type="hidden" id="editId">
    <label>名称</label>
    <input id="editName">
    <label>URL</label>
    <input id="editUrl">
    <div class="btn-row">
      <button class="btn" onclick="closeEdit()">取消</button>
      <button class="btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const BASE = '';

async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type': 'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  return r.json();
}

function showToast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  t.style.borderColor = err ? 'var(--red)' : 'var(--green)';
  t.style.color = err ? 'var(--red)' : 'var(--green)';
  setTimeout(() => t.style.display = 'none', 2500);
}

async function load() {
  const [sourcesRes, statusRes] = await Promise.all([
    api('GET', '/api/sources'),
    api('GET', '/api/status')
  ]);
  const sources = Array.isArray(sourcesRes) ? sourcesRes : [];
  const statusArr = Array.isArray(statusRes) ? statusRes : [];

  // Stats
  const enabled = sources.filter(s => s.enabled);
  document.getElementById('totalSources').textContent = sources.length;
  document.getElementById('enabledSources').textContent = enabled.length;

  let totalSites = 0, totalLives = 0;
  for (const st of statusArr) { totalSites += st.sites_count || 0; totalLives += st.lives_count || 0; }
  // 去重后实际数字会少，但给个参考
  document.getElementById('totalSites').textContent = totalSites;
  document.getElementById('totalLives').textContent = totalLives;

  // Build lookup
  const statusMap = {};
  for (const st of statusArr) statusMap[st.id] = st;

  // Table
  const tbody = document.getElementById('sourceList');
  tbody.innerHTML = '';
  if (sources.length === 0) {
    document.getElementById('emptyMsg').style.display = 'block';
    return;
  }
  document.getElementById('emptyMsg').style.display = 'none';

  for (const s of sources) {
    const st = statusMap[s.id] || {};
    const tr = document.createElement('tr');
    const cached = st.cached || false;
    const sitesCount = st.sites_count ?? '?';
    tr.innerHTML = `
      <td>
        <button class="toggle-btn ${s.enabled ? 'on' : ''}"
                onclick="toggleSource('${s.id}', ${!s.enabled})"></button>
      </td>
      <td><strong>${s.name}</strong></td>
      <td class="url-cell" title="${s.url}">${s.url}</td>
      <td style="text-align:center">
        <span class="tag ${cached ? 'green' : 'gray'}">${cached ? '已缓存' : '未加载'}</span>
        <span style="font-size:11px;color:var(--text-muted);display:block;margin-top:2px">${cached ? `站点${sitesCount}个` : '—'}</span>
      </td>
      <td class="actions">
        <button class="btn" onclick="editSource('${s.id}','${s.name.replace(/'/g,"\\'")}','${s.url.replace(/'/g,"\\'")}')">✏️</button>
        <button class="btn-danger" onclick="deleteSource('${s.id}')">🗑</button>
      </td>
    `;
    tbody.appendChild(tr);
  }
}

async function toggleSource(id, enabled) {
  await api('POST', '/api/sources/toggle', { id, enabled });
  showToast(enabled ? '✅ 已启用' : '⏸ 已停用');
  load();
}

function editSource(id, name, url) {
  document.getElementById('editId').value = id;
  document.getElementById('editName').value = name;
  document.getElementById('editUrl').value = url;
  document.getElementById('editModal').classList.add('active');
}

function closeEdit() { document.getElementById('editModal').classList.remove('active'); }

async function saveEdit() {
  const id = document.getElementById('editId').value;
  const name = document.getElementById('editName').value;
  const url = document.getElementById('editUrl').value;
  if (!name || !url) { showToast('请填写完整', true); return; }
  await api('PUT', `/api/sources/${id}`, { name, url });
  showToast('✅ 已保存');
  closeEdit();
  load();
}

async function deleteSource(id) {
  if (!confirm('确定删除这个接口？')) return;
  await api('DELETE', `/api/sources/${id}`);
  showToast('🗑 已删除');
  load();
}

async function addSource() {
  const name = document.getElementById('newName').value.trim();
  const url = document.getElementById('newUrl').value.trim();
  if (!url) { showToast('请输入接口地址', true); return; }
  try { new URL(url); } catch(e) { showToast('URL 格式不正确', true); return; }
  const result = await api('POST', '/api/sources', { name: name || url, url });
  if (result.error) { showToast('❌ ' + result.error, true); }
  else { showToast('✅ 已添加'); document.getElementById('newName').value = ''; document.getElementById('newUrl').value = ''; }
  load();
}

async function refreshAll() {
  await api('POST', '/api/refresh', {});
  showToast('🔄 缓存已清空，下次访问自动抓取最新数据');
  load();
}

function copyUrl(inputId, btnText) {
  const input = document.getElementById(inputId);
  input.select();
  navigator.clipboard.writeText(input.value).then(() => {
    showToast('📋 已复制到剪贴板');
  }).catch(() => {
    document.execCommand('copy');
    showToast('📋 已复制');
  });
}

load();
</script>
</body>
</html>
